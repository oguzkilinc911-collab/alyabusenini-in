<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özür Dilerim</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #000;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: 50px auto;
    padding: 20px;
}

video {
    width: 100%;
    max-height: 500px;
    border-radius: 20px;
    margin-bottom: 20px;
}

img {
    width: 100%;
    max-width: 500px;
    border-radius: 20px;
    margin-top: 30px;
}

h1 {
    font-size: 45px;
    color: #ff2e2e;
}

button {
    margin: 15px;
    padding: 12px 30px;
    font-size: 18px;
    background-color: #ff2e2e;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: white;
    color: black;
}
</style>
</head>

<body>

<div class="container">

    <!-- Video -->
    <video id="ozurVideo" controls>
        <source src="video.mp4.mp4" type="video/mp4">
        Tarayıcınız video etiketini desteklemiyor.
    </video>

    <br>

    <!-- Video Başlat Butonu -->
    <button onclick="videoyuBaslat()">Videoyu Başlat ▶</button>

    <!-- Fotoğraf -->
    <img src="fotograf.jpg" alt="Bizim Fotoğrafımız">

    <h1>Gerçekten Özür Dilerim...</h1>

    <p>
        Seni kırmak istemezdim.  
        Yaptığım hatanın farkındayım ve gerçekten üzgünüm.
    </p>

    <button onclick="alert('Seni gerçekten çok önemsiyorum ❤️')">
        Affeder misin?
    </button>

</div>

<script>
function videoyuBaslat() {
    var video = document.getElementById("ozurVideo");
    video.play();
}
</script>

</body>
</html>
