<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özür Dilerim</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #1a0000, #330000);
    color: white;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: 50px auto;
    padding: 20px;
}

video, img {
    width: 100%;
    max-width: 500px;
    border-radius: 20px;
    margin: 20px 0;
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
}

h1 {
    font-size: 40px;
    color: #ff4d4d;
    margin: 20px 0;
}

p {
    font-size: 20px;
    line-height: 1.6;
    background: rgba(255, 0, 0, 0.1);
    padding: 15px 20px;
    border-radius: 15px;
    margin: 15px 0;
}

button {
    margin: 15px;
    padding: 12px 30px;
    font-size: 18px;
    background-color: #ff4d4d;
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

button:hover {
    background-color: white;
    color: black;
    transform: scale(1.05);
}

.spacer {
    height: 30px;
}
</style>
</head>

<body>

<div class="container">

    <!-- Video -->
    <video id="ozurVideo" controls>
        <source src="video.mp4.mp4" type="video/mp4">
        Tarayıcınız video etiketini desteklemiyor.
    </video>

    <!-- Video Başlat Butonu -->
    <button onclick="videoyuBaslat()">Videoyu Başlat ▶</button>

    <!-- Paragraf 1 -->
    <p>
        Seni kırmak istemezdim.  
        Yaptığım hatanın farkındayım ve gerçekten üzgünüm.
    </p>

    <!-- Boşluk -->
    <div class="spacer"></div>

    <!-- Paragraf 2 -->
    <h1>Gerçekten Özür Dilerim...</h1>
    <button onclick="alert('Seni gerçekten çok önemsiyorum ❤️')">
        Affeder misin?
    </button>

    <!-- Fotoğraf -->
    <img src="fotograf.jpg.png" alt="Bizim Fotoğrafımız">

</div>

<script>
function videoyuBaslat() {
    var video = document.getElementById("ozurVideo");
    video.play();
}
</script>

</body>
</html>
